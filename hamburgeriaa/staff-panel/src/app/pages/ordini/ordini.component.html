<div class="row">
  <div class="col-12 mb-5 text-center">
    <h1 class="font-display text-glow" style="font-family: 'Anton', sans-serif; font-size: 5rem; color: #CBFF00;">ORDINI IN CORSO</h1>
  </div>
  
  <div class="col-md-4 mb-4" *ngFor="let o of ordini">
    <div class="card bg-white text-black border-thick neon-shadow h-100">
      <div class="card-header bg-black text-white p-3 d-flex justify-content-between align-items-center">
        <span class="font-mono text-neon" style="color: #CBFF00;">#{{o.id}}</span>
        <span class="badge bg-neon text-black" style="background: #CBFF00;">{{o.stato.toUpperCase()}}</span>
      </div>
      <div class="card-body p-4">
        <div class="mb-4">
          <p class="font-mono text-xs opacity-50 mb-1 uppercase tracking-widest">Dettagli Prodotti</p>
          <p class="font-bold uppercase" style="font-size: 1.2rem;">{{o.prodotti_lista}}</p>
        </div>
        
        <div class="d-flex justify-content-between align-items-end mt-auto">
          <div>
            <p class="font-mono text-xs opacity-50 mb-0 uppercase">Prezzo Totale</p>
            <p class="font-display h3 mb-0">€{{o.totale}}</p>
          </div>
        </div>
      </div>
      <div class="card-footer bg-white border-top-0 p-3">
        <div class="btn-group w-100">
          <button class="btn btn-dark font-display py-2" (click)="cambiaStato(o, 'in_preparazione')" [disabled]="o.stato === 'in_preparazione'">PREPARA</button>
          <button class="btn btn-neon font-display py-2" style="background: #CBFF00; color: #000;" (click)="cambiaStato(o, 'pronto')" [disabled]="o.stato === 'pronto'">PRONTO</button>
        </div>
      </div>
    </div>
  </div>
</div>
