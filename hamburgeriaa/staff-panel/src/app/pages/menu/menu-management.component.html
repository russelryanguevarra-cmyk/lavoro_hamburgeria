<div class="row">
  <div class="col-12 mb-5">
    <h1 class="font-display" style="font-family: 'Anton', sans-serif; font-size: 4rem; color: #CBFF00;">GESTIONE MAGAZZINO</h1>
  </div>

  <div class="col-md-4">
    <div class="card p-4 border-thick neon-shadow bg-white text-black">
      <h3 class="font-display mb-4">{{nuovoProdotto.id ? 'MODIFICA' : 'NUOVO'}} PRODOTTO</h3>
      <form (submit)="salvaProdotto()">
        <div class="mb-3">
          <label class="font-mono text-xs uppercase opacity-50">Nome Prodotto</label>
          <input [(ngModel)]="nuovoProdotto.nome" name="nome" class="form-control border-thick rounded-0" placeholder="E.g. FIX DOUBLE" required>
        </div>
        <div class="mb-3">
          <label class="font-mono text-xs uppercase opacity-50">Descrizione Breve</label>
          <textarea [(ngModel)]="nuovoProdotto.descrizione" name="desc" class="form-control border-thick rounded-0" placeholder="Ingredienti..."></textarea>
        </div>
        <div class="row mb-3">
          <div class="col-6">
            <label class="font-mono text-xs uppercase opacity-50">Prezzo (€)</label>
            <input [(ngModel)]="nuovoProdotto.prezzo" name="prezzo" type="number" step="0.1" class="form-control border-thick rounded-0" required>
          </div>
          <div class="col-6">
            <label class="font-mono text-xs uppercase opacity-50">Categoria</label>
            <select [(ngModel)]="nuovoProdotto.categoria" name="cat" class="form-control border-thick rounded-0">
              <option value="panini">PANINI</option>
              <option value="bevande">BEVANDE</option>
              <option value="contorni">CONTORNI</option>
              <option value="menu">MENU</option>
            </select>
          </div>
        </div>
        <div class="mb-4">
          <label class="font-mono text-xs uppercase opacity-50">URL Immagine</label>
          <input [(ngModel)]="nuovoProdotto.immagine_url" name="img" class="form-control border-thick rounded-0" placeholder="https://...">
        </div>
        <button class="btn btn-dark w-100 font-display py-3 text-xl" type="submit">
          {{nuovoProdotto.id ? 'AGGIORNA' : 'PUBBLICA'}}
        </button>
        <button *ngIf="nuovoProdotto.id" class="btn btn-link w-100 mt-2 text-black font-mono text-xs" (click)="nuovoProdotto = resetProdotto()">Annulla</button>
      </form>
    </div>
  </div>

  <div class="col-md-8">
    <div class="bg-white text-black border-thick p-2">
      <table class="table table-hover mb-0">
        <thead class="bg-black text-white">
          <tr class="font-mono text-xs uppercase">
            <th>Img</th>
            <th>Prodotto</th>
            <th>Cat</th>
            <th>Prezzo</th>
            <th class="text-end">Azioni</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let p of prodotti" class="align-middle">
            <td>
              <div class="border-thick bg-gray-100" style="width: 50px; height: 50px; overflow: hidden;">
                <img [src]="p.immagine_url" style="width: 100%; height: 100%; object-fit: cover;">
              </div>
            </td>
            <td>
              <div class="font-bold uppercase">{{p.nome}}</div>
              <div class="text-xs opacity-50">{{p.descrizione | slice:0:40}}...</div>
            </td>
            <td><span class="badge bg-black text-white rounded-0 px-2">{{p.categoria}}</span></td>
            <td class="font-mono font-bold">€{{p.prezzo}}</td>
            <td class="text-end">
              <button class="btn btn-sm btn-outline-dark rounded-0 me-2" (click)="modifica(p)">EDIT</button>
              <button class="btn btn-sm btn-dark rounded-0" (click)="elimina(p.id)">CANC</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
